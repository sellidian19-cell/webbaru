<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL88</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
    </style>
</head>
<body class="bg-[#121212] text-white font-sans selection:bg-purple-500">

    <div class="flex justify-center min-h-screen">
        <div class="w-full max-w-md bg-[#121212] min-h-screen relative shadow-2xl flex flex-col">
            
            <!-- HEADER LOGO & NAVIGASI -->
            <header class="sticky top-0 z-30 bg-[#1a1a1a] border-b border-gray-800 shadow-md">
                <div class="flex justify-between items-center px-4 py-3">
                    <button onclick="toggleSidebar()" class="bg-gradient-to-br from-purple-600 to-purple-800 p-2 rounded-lg shadow-lg">
                        <i data-lucide="menu" class="w-6 h-6 text-white"></i>
                    </button>
                    
                    <div id="logo-container" class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-full flex items-center justify-center">
                            <i data-lucide="crown" class="w-4 h-4 text-white"></i>
                        </div>
                        <h1 id="logo-text-display" class="text-2xl font-black italic bg-gradient-to-r from-purple-400 to-white bg-clip-text text-transparent">
                            MARVEL<span class="text-white">88</span>
                        </h1>
                    </div>
                    
                    <div class="flex space-x-3">
                        <i data-lucide="search" class="w-6 h-6 text-gray-300"></i>
                        <i data-lucide="bell" class="w-6 h-6 text-gray-300"></i>
                    </div>
                </div>

                <!-- Category Tabs -->
                <div class="flex overflow-x-auto hide-scrollbar px-2 py-2 bg-[#1a1a1a]">
                    <button id="tab-sports" onclick="changeCategory('sports')" class="cat-btn whitespace-nowrap px-4 py-2 text-sm font-medium text-gray-400">Sports</button>
                    <button id="tab-poker" onclick="changeCategory('poker')" class="cat-btn whitespace-nowrap px-4 py-2 text-sm font-medium text-gray-400">Poker</button>
                    <button id="tab-casino" onclick="changeCategory('casino')" class="cat-btn whitespace-nowrap px-4 py-2 text-sm font-medium text-gray-400">Casino</button>
                    <button id="tab-togel" onclick="changeCategory('togel')" class="cat-btn whitespace-nowrap px-4 py-2 text-sm font-medium text-gray-400">Togel</button>
                    <button id="tab-slot" onclick="changeCategory('slot')" class="cat-btn whitespace-nowrap px-4 py-2 text-sm font-medium border-b-2 border-purple-500 text-purple-400">Slot</button>
                </div>
            </header>

            <!-- BERANDA UTAMA -->
            <main id="main-view" class="flex-1 pb-24 overflow-y-auto">
                <!-- Banner -->
                <div class="relative w-full h-48 bg-gray-800">
                    <img id="banner-img" src="https://images.unsplash.com/photo-1518972553018-8686121b67cc?auto=format&fit=crop&q=80&w=800&h=400" class="w-full h-full object-cover opacity-90" />
                    <div class="absolute inset-0 bg-gradient-to-t from-[#121212] via-transparent to-transparent flex flex-col justify-end p-4">
                        <h2 class="text-3xl font-black text-yellow-500 text-center drop-shadow-lg">RP 120,000,000</h2>
                        <p class="text-center text-sm font-bold text-white mb-2 drop-shadow-md">MAIN SEKARANG</p>
                    </div>
                </div>

                <!-- Marquee Text -->
                <div class="bg-[#1a1a1a] px-4 py-2 flex items-center border-y border-gray-800 shadow-inner">
                    <i data-lucide="volume-2" class="w-4 h-4 text-gray-400 mr-3 flex-shrink-0"></i>
                    <div class="overflow-hidden whitespace-nowrap w-full">
                        <div id="marquee-text-display" class="animate-marquee text-xs text-gray-300">
                            ★ Selamat Datang di MARVEL88 - Situs Game Online Terpercaya! ★
                        </div>
                    </div>
                </div>

                <!-- AREA TOMBOL Aksi (LOGGED IN vs LOGGED OUT) -->
                <div id="auth-actions-container" class="px-4 py-3">
                    <!-- Tombol jika SUDAH LOGIN -->
                    <div id="btn-group-logged-in" class="flex space-x-3 hidden">
                        <button onclick="openDepoPage()" class="flex-1 bg-gradient-to-r from-purple-700 to-purple-500 hover:from-purple-600 hover:to-purple-400 text-white font-bold py-2.5 rounded-lg text-sm border border-purple-400/50 transition shadow-lg">Deposit</button>
                        <button class="flex-1 bg-gradient-to-r from-purple-700 to-purple-500 hover:from-purple-600 hover:to-purple-400 text-white font-bold py-2.5 rounded-lg text-sm border border-purple-400/50 transition shadow-lg">Transaksi</button>
                    </div>

                    <!-- Tombol jika BELUM LOGIN / LOGOUT -->
                    <div id="btn-group-logged-out" class="flex space-x-3">
                        <button onclick="masukAkunSimulasi()" class="flex-1 bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-black font-bold py-2.5 rounded-lg text-sm transition shadow-lg">Masuk</button>
                        <button onclick="masukAkunSimulasi()" class="flex-1 bg-gradient-to-r from-purple-700 to-purple-500 hover:from-purple-600 hover:to-purple-400 text-white font-bold py-2.5 rounded-lg text-sm border border-purple-400/50 transition shadow-lg">Daftar</button>
                    </div>
                </div>

                <!-- KOTAK INFORMASI AKUN (Hanya muncul jika LOGIN) -->
                <div id="user-profile-card" class="mx-4 mb-5 bg-[#1e1e1e] rounded-xl p-4 flex justify-between items-center shadow-lg border border-gray-800 hidden">
                    <div class="flex items-center space-x-4">
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-gray-500 rounded-full border-2 border-gray-400 flex items-center justify-center shadow-inner">
                                <i data-lucide="star" class="w-6 h-6 text-white fill-current"></i>
                            </div>
                            <span class="text-[11px] text-gray-300 mt-1 font-semibold">Iron</span>
                        </div>
                        <div>
                            <h3 class="text-white font-bold text-sm tracking-wide" id="home-username">yoga098</h3>
                            <div class="flex items-center space-x-3 mt-1.5">
                                <p class="text-emerald-400 font-bold text-[15px]" id="home-balance">Rp 2.000</p>
                                <button class="text-white hover:text-gray-300"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                                <button class="text-white hover:text-gray-300"><i data-lucide="crosshair" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="w-12 h-12 bg-yellow-600/20 rounded-lg flex items-center justify-center text-3xl border border-yellow-600/30">
                        🎁
                    </div>
                </div>

                <!-- GAME GALLERY -->
                <div class="px-4">
                    <div class="flex justify-between items-end mb-3">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="crown" class="w-5 h-5 text-yellow-500 fill-current"></i>
                            <div>
                                <h3 id="current-category-title" class="text-yellow-500 font-bold text-sm uppercase">GAMES SLOT</h3>
                                <p class="text-[9px] text-yellow-500/70">( SILAKAN PILIH GAME )</p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button class="bg-gray-800 p-1 rounded-full text-yellow-500"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <button class="bg-gray-800 p-1 rounded-full text-yellow-500"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <div id="game-gallery" class="flex overflow-x-auto gap-3 pb-4 hide-scrollbar">
                        <!-- Game dimasukkan lewat JavaScript -->
                    </div>
                </div>
            </main>

            <!-- HALAMAN DEPOSIT / WITHDRAW -->
            <div id="deposit-withdraw-view" class="hidden flex-1 pb-24 bg-[#121212] overflow-y-auto">
                <div class="flex border-b border-gray-800">
                    <button id="tab-depo-btn" onclick="switchDepoTab('depo')" class="flex-1 py-3 text-center font-bold bg-purple-700 text-white">Deposit</button>
                    <button id="tab-wd-btn" onclick="switchDepoTab('wd')" class="flex-1 py-3 text-center font-bold bg-gray-800 text-gray-400">Penarikan</button>
                </div>

                <div class="p-4 space-y-4">
                    <div class="bg-[#1e1e1e] p-4 rounded-xl border border-gray-800">
                        <p class="text-xs text-gray-400">Dompet Utama</p>
                        <p id="depo-page-balance" class="text-2xl font-black text-white mt-1">Rp 0</p>
                    </div>

                    <div id="depo-section">
                        <h4 class="text-purple-400 text-sm font-bold mb-3">Pilih Metode Deposit</h4>
                        <div id="payment-methods-grid" class="grid grid-cols-3 gap-2"></div>
                    </div>

                    <div id="wd-section" class="hidden space-y-3">
                        <h4 class="text-purple-400 text-sm font-bold mb-3">Formulir Penarikan (Withdraw)</h4>
                        <input type="number" placeholder="Nominal Penarikan (Min Rp 50.000)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm">
                        <input type="text" placeholder="Nama & Nomor Rekening Tujuan" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm">
                        <button onclick="alert('Permintaan penarikan dikirim!')" class="w-full bg-purple-600 font-bold py-3 rounded-lg">Kirim Penarikan</button>
                    </div>
                </div>
            </div>

            <!-- SIDEBAR MENU SAMPING -->
            <div id="sidebar-drawer" class="fixed inset-0 bg-black/80 z-50 hidden flex">
                <div class="w-4/5 max-w-xs bg-[#1a1a1a] h-full p-4 overflow-y-auto space-y-4 shadow-2xl flex flex-col justify-between">
                    <div>
                        <!-- Sidebar Header -->
                        <div class="flex justify-between items-center border-b border-gray-800 pb-3 mb-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 bg-gray-700 rounded-full flex items-center justify-center">
                                    <i data-lucide="user" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-sm" id="sidebar-username">Tamu</h4>
                                    <p id="sidebar-balance" class="text-xs text-emerald-400 font-bold">Belum Masuk</p>
                                </div>
                            </div>
                            <button onclick="toggleSidebar()" class="text-gray-400"><i data-lucide="x"></i></button>
                        </div>

                        <button class="w-full mb-4 bg-gray-800 p-3 rounded-xl flex items-center space-x-3 text-yellow-400 text-xs font-bold border border-gray-700">
                            <i data-lucide="lightbulb" class="w-4 h-4"></i>
                            <span>Panduan Pemain</span>
                        </button>

                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-[#242424] p-3 rounded-xl flex flex-col items-center justify-center space-y-1">
                                <i data-lucide="award" class="text-emerald-400"></i>
                                <span>Bonus Saya</span>
                            </div>
                            <div class="bg-[#242424] p-3 rounded-xl flex flex-col items-center justify-center space-y-1">
                                <i data-lucide="history" class="text-purple-400"></i>
                                <span>Riwayat Transaksi</span>
                            </div>
                        </div>
                    </div>

                    <!-- TOMBOL DYNAMIC DI SIDEBAR (Masuk/Daftar OR Keluar) -->
                    <div id="sidebar-auth-button">
                        <!-- Diisi secara dinamis oleh JavaScript -->
                    </div>
                </div>
                <div onclick="toggleSidebar()" class="flex-1"></div>
            </div>

            <!-- BOTTOM NAVIGATION -->
            <nav class="fixed bottom-0 w-full max-w-md bg-gradient-to-r from-purple-900 to-indigo-900 rounded-t-2xl z-40 border-t border-purple-500/30">
                <div class="flex justify-around items-center px-2 py-3">
                    <button onclick="showHome()" class="flex flex-col items-center text-white">
                        <i data-lucide="home" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px]">Home</span>
                    </button>
                    <button onclick="openDepoPage()" class="flex flex-col items-center text-purple-300 hover:text-white transition">
                        <i data-lucide="wallet" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px]">Deposit</span>
                    </button>
                    <button onclick="openLiveChat()" class="flex flex-col items-center text-purple-300 hover:text-white transition">
                        <i data-lucide="message-square" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px]">Live Chat</span>
                    </button>
                    <button onclick="toggleSidebar()" class="flex flex-col items-center text-purple-300 hover:text-white transition">
                        <i data-lucide="user" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px]">Akun</span>
                    </button>
                </div>
            </nav>

        </div>
    </div>

    <script>
        lucide.createIcons();

        function toggleSidebar() {
            document.getElementById('sidebar-drawer').classList.toggle('hidden');
        }

        function showHome() {
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('deposit-withdraw-view').classList.add('hidden');
            changeCategory('slot');
        }

        function openDepoPage() {
            const isLoggedIn = localStorage.getItem('is_logged_in') === 'true';
            if(!isLoggedIn) {
                alert("Silakan Masuk terlebih dahulu untuk melakukan Deposit!");
                return;
            }
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('deposit-withdraw-view').classList.remove('hidden');
            switchDepoTab('depo');
        }

        function switchDepoTab(type) {
            const depoBtn = document.getElementById('tab-depo-btn');
            const wdBtn = document.getElementById('tab-wd-btn');
            const depoSec = document.getElementById('depo-section');
            const wdSec = document.getElementById('wd-section');

            if(type === 'depo') {
                depoBtn.className = "flex-1 py-3 text-center font-bold bg-purple-700 text-white";
                wdBtn.className = "flex-1 py-3 text-center font-bold bg-gray-800 text-gray-400";
                depoSec.classList.remove('hidden');
                wdSec.classList.add('hidden');
            } else {
                wdBtn.className = "flex-1 py-3 text-center font-bold bg-purple-700 text-white";
                depoBtn.className = "flex-1 py-3 text-center font-bold bg-gray-800 text-gray-400";
                wdSec.classList.remove('hidden');
                depoSec.classList.add('hidden');
            }
        }

        function openLiveChat() {
            const chatUrl = localStorage.getItem('app_chat_url') || 'https://google.com';
            window.open(chatUrl, '_blank');
        }

        // FUNGSI LOGOUT (KELUAR AKUN)
        function keluarAkun() {
            if(confirm("Apakah Anda yakin ingin keluar dari akun?")) {
                localStorage.setItem('is_logged_in', 'false');
                alert("Anda telah berhasil keluar.");
                location.reload();
            }
        }

        // FUNGSI SIMULASI MASUK AKUN
        function masukAkunSimulasi() {
            const name = prompt("Masukkan Username Anda:", "yoga098");
            if(name) {
                localStorage.setItem('username', name);
                localStorage.setItem('is_logged_in', 'true');
                alert("Berhasil masuk sebagai " + name);
                location.reload();
            }
        }

        // MUAT TAMPILAN SESUAI STATUS LOGIN / LOGOUT
        function renderAuthView() {
            const isLoggedIn = localStorage.getItem('is_logged_in') === 'true';
            const username = localStorage.getItem('username') || 'yoga098';
            const balance = parseFloat(localStorage.getItem('user_balance') || 2000);
            const formattedBalance = 'Rp ' + balance.toLocaleString('id-ID');

            const btnLoggedIn = document.getElementById('btn-group-logged-in');
            const btnLoggedOut = document.getElementById('btn-group-logged-out');
            const userProfileCard = document.getElementById('user-profile-card');
            const sidebarAuthBtn = document.getElementById('sidebar-auth-button');

            if(isLoggedIn) {
                // Tampilan saat LOGGED IN
                btnLoggedIn.classList.remove('hidden');
                btnLoggedOut.classList.add('hidden');
                userProfileCard.classList.remove('hidden');

                document.getElementById('home-username').innerText = username;
                document.getElementById('sidebar-username').innerText = username;
                document.getElementById('home-balance').innerText = formattedBalance;
                document.getElementById('sidebar-balance').innerText = formattedBalance;
                document.getElementById('depo-page-balance').innerText = formattedBalance;

                sidebarAuthBtn.innerHTML = `
                    <button onclick="keluarAkun()" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded-xl flex items-center justify-center space-x-2 text-white text-sm font-bold shadow-lg transition">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span>Keluar Akun</span>
                    </button>
                `;
            } else {
                            // Tampilan saat LOGGED OUT
            btnLoggedIn.classList.add('hidden');
            btnLoggedOut.classList.remove('hidden');
            userProfileCard.classList.add('hidden');

            document.getElementById('sidebar-username').innerText = "Tamu";
            document.getElementById('sidebar-balance').innerText = "Belum Masuk";

            sidebarAuthBtn.innerHTML = `
                <div class="flex space-x-2">
                    <button onclick="masukAkunSimulasi()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black py-2.5 rounded-xl font-bold text-xs">Masuk</button>
                    <button onclick="masukAkunSimulasi()" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded-xl font-bold text-xs">Daftar</button>
                </div>
            `;
        }
        lucide.createIcons();
    }

    function loadAdminSettings() {
        const marquee = localStorage.getItem('app_marquee');
        const banner = localStorage.getItem('app_banner_img');
        if(marquee) document.getElementById('marquee-text-display').innerText = marquee;
        if(banner) document.getElementById('banner-img').src = banner;

        renderAuthView();
        changeCategory('slot');
    }

    function changeCategory(cat) {
        document.getElementById('current-category-title').innerText = 'GAMES ' + cat.toUpperCase();
        
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('border-b-2', 'border-purple-500', 'text-purple-400');
            btn.classList.add('text-gray-400');
        });
        const activeBtn = document.getElementById('tab-' + cat);
        if(activeBtn) {
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('border-b-2', 'border-purple-500', 'text-purple-400');
        }

        const games = JSON.parse(localStorage.getItem('app_games_' + cat) || '[]');
        const gallery = document.getElementById('game-gallery');

        if(games.length > 0) {
            gallery.innerHTML = games.map(g => `
                <div class="min-w-[130px] bg-[#2a2a30] rounded-xl overflow-hidden relative shadow-md">
                    <div class="absolute top-1 left-1 bg-black/70 rounded-full p-1"><i data-lucide="play" class="w-3 h-3 text-white fill-current"></i></div>
                    <div class="absolute top-1 right-1 bg-black/70 px-1 rounded text-[9px] font-bold text-white">BET 100</div>
                    <img src="${g.img}" class="w-full h-28 object-cover">
                    <div class="p-2 flex justify-between items-center bg-[#1e1e1e]">
                        <p class="text-[10px] font-bold text-gray-200 truncate pr-1">${g.title}</p>
                        <i data-lucide="star" class="w-3 h-3 text-gray-500 hover:text-yellow-400"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        } else {
            gallery.innerHTML = `<div class="w-full bg-[#1e1e1e] p-6 rounded-xl border border-gray-800 text-center">
                <p class="text-xs text-gray-400">Belum ada game di kategori <b>${cat}</b>.</p>
            </div>`;
        }
    }

    loadAdminSettings();
</script>
</body>
</html>
